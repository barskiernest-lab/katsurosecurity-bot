<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round Survival - Выживание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        #gameCanvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            padding: 15px;
            pointer-events: none;
            z-index: 100;
        }

        .stat-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            transition: width 0.3s;
            border-radius: 8px;
        }

        .health-fill { background: linear-gradient(90deg, #ff4444, #ff6666); }
        .hunger-fill { background: linear-gradient(90deg, #ffaa00, #ffcc44); }
        .xp-fill { background: linear-gradient(90deg, #44aaff, #66ccff); }

        #inventory {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            border: 2px solid #555;
            pointer-events: auto;
            z-index: 100;
        }

        .inv-slot {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #555;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .inv-slot:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .inv-slot.active {
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        .inv-slot .item-icon {
            font-size: 28px;
        }

        .inv-slot .item-count {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 11px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        .inv-slot .slot-key {
            position: absolute;
            top: 2px;
            left: 5px;
            font-size: 10px;
            color: #888;
        }

        #craftPanel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #555;
            max-height: 70vh;
            overflow-y: auto;
            pointer-events: auto;
            z-index: 100;
            display: none;
            width: 280px;
        }

        #craftPanel.show {
            display: block;
        }

        #craftPanel h3 {
            margin-bottom: 15px;
            color: #ffcc00;
            text-align: center;
            font-size: 18px;
        }

        .craft-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .craft-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffcc00;
        }

        .craft-item.cant-craft {
            opacity: 0.5;
        }

        .craft-item .craft-icon {
            font-size: 32px;
        }

        .craft-item .craft-info {
            flex: 1;
        }

        .craft-item .craft-name {
            font-weight: bold;
            font-size: 14px;
        }

        .craft-item .craft-recipe {
            font-size: 11px;
            color: #aaa;
        }

        #minimap {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #555;
            border-radius: 10px;
            z-index: 100;
            overflow: hidden;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
        }

        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #555;
            pointer-events: none;
            z-index: 200;
            display: none;
            max-width: 250px;
        }

        #tooltip .tt-name {
            font-weight: bold;
            color: #ffcc00;
        }

        #tooltip .tt-desc {
            font-size: 12px;
            color: #ccc;
            margin-top: 5px;
        }

        #tooltip .tt-stats {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }

        #controls {
            position: fixed;
            bottom: 100px;
            left: 20px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
            z-index: 100;
        }

        #dayNight {
            position: fixed;
            top: 80px;
            left: 15px;
            font-size: 14px;
            color: #ccc;
            pointer-events: none;
            z-index: 100;
        }

        #killFeed {
            position: fixed;
            top: 120px;
            left: 15px;
            pointer-events: none;
            z-index: 100;
        }

        .kill-msg {
            font-size: 12px;
            color: #ff6666;
            margin-bottom: 4px;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        #deathScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 500;
        }

        #deathScreen.show {
            display: flex;
        }

        #deathScreen h1 {
            font-size: 64px;
            color: #ff4444;
            margin-bottom: 20px;
        }

        #deathScreen p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
        }

        #restartBtn {
            padding: 15px 40px;
            font-size: 18px;
            background: #ffcc00;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #restartBtn:hover {
            background: #ffdd44;
            transform: scale(1.05);
        }

        #ammoDisplay {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #fff;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="stat-bar"><div class="stat-fill health-fill" id="healthBar"></div></div>
        <div class="stat-bar"><div class="stat-fill hunger-fill" id="hungerBar"></div></div>
        <div class="stat-bar"><div class="stat-fill xp-fill" id="xpBar"></div></div>
        <div id="dayNight"></div>
    </div>

    <div id="killFeed"></div>

    <div id="minimap"><canvas id="minimapCanvas"></canvas></div>

    <div id="inventory"></div>

    <div id="ammoDisplay"></div>

    <div id="craftPanel">
        <h3>Крафт (Tab)</h3>
        <div id="craftList"></div>
    </div>

    <div id="controls">
        WASD - движение | ЛКМ - атака/стрелять<br>
        1-5 - выбор слота | Tab - крафт<br>
        E - подобрать | Пробел - рывок
    </div>

    <div id="tooltip">
        <div class="tt-name"></div>
        <div class="tt-desc"></div>
        <div class="tt-stats"></div>
    </div>

    <div id="deathScreen">
        <h1>ВЫ ПОГИБЛИ</h1>
        <p id="deathStats"></p>
        <button id="restartBtn">Заново</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mmCanvas = document.getElementById('minimapCanvas');
        const mmCtx = mmCanvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        mmCanvas.width = 150;
        mmCanvas.height = 150;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const WORLD_SIZE = 3000;
        const TILE = 40;

        const ITEMS = {
            wood: { name: 'Дерево', icon: '🪵', type: 'resource', stackable: true },
            stone: { name: 'Камень', icon: '🪨', type: 'resource', stackable: true },
            iron: { name: 'Железо', icon: '⚙️', type: 'resource', stackable: true },
            fiber: { name: 'Волокно', icon: '🧵', type: 'resource', stackable: true },
            food: { name: 'Еда', icon: '🍖', type: 'consumable', hunger: 30, stackable: true },
            berry: { name: 'Ягоды', icon: '🫐', type: 'consumable', hunger: 15, stackable: true },
            mushroom: { name: 'Гриб', icon: '🍄', type: 'consumable', hunger: 20, stackable: true },
            bandage: { name: 'Бинт', icon: '🩹', type: 'consumable', health: 25, stackable: true },
            wood_pick: { name: 'Деревянная кирка', icon: '⛏️', type: 'tool', damage: 5, mineSpeed: 1.5, stackable: false },
            wood_axe: { name: 'Деревянный топор', icon: '🪓', type: 'weapon', damage: 12, stackable: false },
            stone_pick: { name: 'Каменная кирка', icon: '⛏️', type: 'tool', damage: 8, mineSpeed: 2, stackable: false },
            stone_axe: { name: 'Каменный топор', icon: '🪓', type: 'weapon', damage: 18, stackable: false },
            sword: { name: 'Меч', icon: '⚔️', type: 'weapon', damage: 25, stackable: false },
            shotgun: { name: 'Дробовик', icon: '🔫', type: 'weapon', damage: 40, range: 250, fireRate: 800, ammo: 'shell', stackable: false },
            rifle: { name: 'Автомат', icon: '🔫', type: 'weapon', damage: 22, range: 400, fireRate: 120, ammo: 'bullet', stackable: false },
            sniper: { name: 'Снайперка', icon: '🎯', type: 'weapon', damage: 80, range: 600, fireRate: 1200, ammo: 'bullet', stackable: false },
            shell: { name: 'Патроны (дробь)', icon: '🔶', type: 'ammo', stackable: true },
            bullet: { name: 'Патроны', icon: '🟡', type: 'ammo', stackable: true },
            armor: { name: 'Бронежилет', icon: '🦺', type: 'armor', defense: 15, stackable: false },
        };

        const RECIPES = [
            { result: 'wood_pick', count: 1, needs: { wood: 10, fiber: 3 } },
            { result: 'wood_axe', count: 1, needs: { wood: 12, fiber: 4 } },
            { result: 'stone_pick', count: 1, needs: { stone: 8, wood: 5, fiber: 3 } },
            { result: 'stone_axe', count: 1, needs: { stone: 10, wood: 5, fiber: 4 } },
            { result: 'sword', count: 1, needs: { iron: 12, wood: 4, stone: 6 } },
            { result: 'shotgun', count: 1, needs: { iron: 18, wood: 8, stone: 10 } },
            { result: 'rifle', count: 1, needs: { iron: 22, wood: 6, stone: 8 } },
            { result: 'sniper', count: 1, needs: { iron: 25, wood: 10, stone: 15 } },
            { result: 'shell', count: 10, needs: { iron: 4, stone: 3 } },
            { result: 'bullet', count: 15, needs: { iron: 3, stone: 2 } },
            { result: 'armor', count: 1, needs: { iron: 20, fiber: 10 } },
            { result: 'bandage', count: 3, needs: { fiber: 5 } },
        ];

        let game = {
            camera: { x: 0, y: 0 },
            entities: [],
            particles: [],
            drops: [],
            trees: [],
            rocks: [],
            bushes: [],
            dayTime: 0,
            daySpeed: 0.00008,
            kills: 0,
            timePlayed: 0,
            running: true,
        };

        let player = null;

        function createPlayer() {
            return {
                x: WORLD_SIZE / 2,
                y: WORLD_SIZE / 2,
                radius: 20,
                speed: 3.2,
                health: 100,
                maxHealth: 100,
                hunger: 100,
                maxHunger: 100,
                xp: 0,
                level: 1,
                xpNeeded: 50,
                armor: 0,
                maxArmor: 100,
                vx: 0,
                vy: 0,
                angle: 0,
                inv: Array(5).fill(null).map(() => ({ id: null, count: 0 })),
                selectedSlot: 0,
                inventory: {},
                lastAttack: 0,
                dashCooldown: 0,
                isDashing: false,
                dashTimer: 0,
                dashDx: 0,
                dashDy: 0,
                hitCooldown: 0,
                eyeBlink: 0,
                mouthOpen: 0,
                walkCycle: 0,
            };
        }

        function spawnTree() {
            for (let i = 0; i < 200; i++) {
                let x = Math.random() * WORLD_SIZE;
                let y = Math.random() * WORLD_SIZE;
                if (Math.hypot(x - WORLD_SIZE / 2, y - WORLD_SIZE / 2) < 120) continue;
                game.trees.push({
                    x, y,
                    radius: 25 + Math.random() * 15,
                    health: 50 + Math.random() * 30,
                    maxHealth: 80,
                    height: 60 + Math.random() * 40,
                    type: Math.floor(Math.random() * 3),
                    sway: Math.random() * Math.PI * 2,
                });
            }
        }

        function spawnRocks() {
            for (let i = 0; i < 100; i++) {
                let x = Math.random() * WORLD_SIZE;
                let y = Math.random() * WORLD_SIZE;
                game.rocks.push({
                    x, y,
                    radius: 15 + Math.random() * 10,
                    health: 60 + Math.random() * 40,
                    maxHealth: 100,
                    type: Math.floor(Math.random() * 3),
                });
            }
        }

        function spawnBushes() {
            for (let i = 0; i < 80; i++) {
                let x = Math.random() * WORLD_SIZE;
                let y = Math.random() * WORLD_SIZE;
                game.bushes.push({
                    x, y,
                    radius: 12,
                    type: Math.random() < 0.5 ? 'berry' : 'fiber',
                    picked: false,
                    respawnTimer: 0,
                });
            }
        }

        function spawnEnemies() {
            for (let i = 0; i < 40; i++) {
                spawnOneEnemy();
            }
        }

        function spawnOneEnemy() {
            let angle = Math.random() * Math.PI * 2;
            let dist = 300 + Math.random() * 1000;
            let types = ['zombie', 'skeleton', 'spider'];
            let type = types[Math.floor(Math.random() * types.length)];
            let e = {
                x: player.x + Math.cos(angle) * dist,
                y: player.y + Math.sin(angle) * dist,
                radius: 16,
                speed: 1 + Math.random() * 0.8,
                health: 40,
                maxHealth: 40,
                damage: 8,
                type: type,
                state: 'idle',
                attackCooldown: 0,
                vx: 0,
                vy: 0,
                angle: 0,
                walkCycle: 0,
                aggroRange: 200,
                wanderTimer: 0,
                wanderAngle: 0,
            };
            if (type === 'zombie') {
                e.health = 50;
                e.maxHealth = 50;
                e.damage = 10;
                e.speed = 1.1;
                e.radius = 18;
            } else if (type === 'skeleton') {
                e.health = 35;
                e.maxHealth = 35;
                e.damage = 12;
                e.speed = 1.4;
                e.aggroRange = 300;
            } else {
                e.health = 25;
                e.maxHealth = 25;
                e.damage = 6;
                e.speed = 2;
                e.radius = 14;
            }
            if (e.x > 50 && e.x < WORLD_SIZE - 50 && e.y > 50 && e.y < WORLD_SIZE - 50) {
                game.entities.push(e);
            }
        }

        function dist(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function spawnParticle(x, y, color, count, speed, life) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let spd = Math.random() * speed;
                game.particles.push({
                    x, y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd,
                    life: life || 30,
                    maxLife: life || 30,
                    color,
                    size: 2 + Math.random() * 3,
                });
            }
        }

        function spawnDrop(x, y, itemId, count) {
            game.drops.push({
                x, y,
                itemId,
                count,
                lifetime: 600,
                bobOffset: Math.random() * Math.PI * 2,
            });
        }

        function addToInventory(itemId, count) {
            count = count || 1;
            let item = ITEMS[itemId];
            if (!item) return false;

            if (item.stackable) {
                let existing = player.inventory[itemId] || 0;
                player.inventory[itemId] = existing + count;
                return true;
            } else {
                for (let i = 0; i < 5; i++) {
                    if (player.inv[i].id === itemId) {
                        return false;
                    }
                }
                for (let i = 0; i < 5; i++) {
                    if (!player.inv[i].id) {
                        player.inv[i] = { id: itemId, count: 1 };
                        return true;
                    }
                }
                return false;
            }
        }

        function countItem(itemId) {
            let item = ITEMS[itemId];
            if (!item) return 0;
            if (item.stackable) return player.inventory[itemId] || 0;
            let c = 0;
            for (let i = 0; i < 5; i++) {
                if (player.inv[i].id === itemId) c++;
            }
            return c;
        }

        function removeItem(itemId, count) {
            count = count || 1;
            let item = ITEMS[itemId];
            if (item && item.stackable) {
                if ((player.inventory[itemId] || 0) >= count) {
                    player.inventory[itemId] -= count;
                    if (player.inventory[itemId] <= 0) delete player.inventory[itemId];
                    return true;
                }
                return false;
            } else {
                for (let c = 0; c < count; c++) {
                    let found = false;
                    for (let i = 0; i < 5; i++) {
                        if (player.inv[i].id === itemId) {
                            player.inv[i] = { id: null, count: 0 };
                            found = true;
                            break;
                        }
                    }
                    if (!found) return false;
                }
                return true;
            }
        }

        function craftItem(recipe) {
            for (let [item, need] of Object.entries(recipe.needs)) {
                if (countItem(item) < need) return false;
            }
            for (let [item, need] of Object.entries(recipe.needs)) {
                removeItem(item, need);
            }
            addToInventory(recipe.result, recipe.count);
            return true;
        }

        function getSelectedItem() {
            let slot = player.inv[player.selectedSlot];
            return slot.id ? ITEMS[slot.id] : null;
        }

        function getSelectedItemKey() {
            return player.inv[player.selectedSlot].id;
        }

        function drawRoundCharacter(x, y, radius, angle, bodyColor, eyeColor, health, maxHealth, isWalking) {
            ctx.save();

            let bobY = isWalking ? Math.sin(player.walkCycle * 0.3) * 3 : 0;

            ctx.beginPath();
            ctx.arc(x, y + bobY, radius, 0, Math.PI * 2);
            let grad = ctx.createRadialGradient(x - 5, y + bobY - 5, 2, x, y + bobY, radius);
            grad.addColorStop(0, bodyColor);
            grad.addColorStop(1, shadeColor(bodyColor, -30));
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = shadeColor(bodyColor, -50);
            ctx.lineWidth = 2;
            ctx.stroke();

            let eyeOffX = Math.cos(angle) * 6;
            let eyeOffY = Math.sin(angle) * 6;

            let eyeSize = 5;
            if (player.eyeBlink > 0) eyeSize = 1;

            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x + eyeOffX - 4, y + bobY + eyeOffY - 3, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + eyeOffX + 4, y + bobY + eyeOffY - 3, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#222';
            let pupilOff = 2;
            ctx.beginPath();
            ctx.arc(x + eyeOffX - 4 + Math.cos(angle) * pupilOff, y + bobY + eyeOffY - 3 + Math.sin(angle) * pupilOff, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + eyeOffX + 4 + Math.cos(angle) * pupilOff, y + bobY + eyeOffY - 3 + Math.sin(angle) * pupilOff, 2.5, 0, Math.PI * 2);
            ctx.fill();

            if (health < maxHealth) {
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 15, y - radius - 18, 30, 6);
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(x - 15, y - radius - 18, 30 * (health / maxHealth), 6);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(x - 15, y - radius - 18, 30, 6);
            }

            ctx.restore();
        }

        function drawZombie(x, y, radius, angle, walkCycle) {
            ctx.save();
            let bobY = Math.sin(walkCycle * 0.3) * 2;

            ctx.beginPath();
            ctx.arc(x, y + bobY, radius, 0, Math.PI * 2);
            let grad = ctx.createRadialGradient(x - 3, y + bobY - 3, 2, x, y + bobY, radius);
            grad.addColorStop(0, '#5a8a3c');
            grad.addColorStop(1, '#3d5a28');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#2a4018';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(x - 5, y + bobY - 4, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 5, y + bobY - 4, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#440000';
            ctx.beginPath();
            ctx.arc(x - 5, y + bobY - 4, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 5, y + bobY - 4, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#2a4018';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y + bobY + 5, 5, 0, Math.PI);
            ctx.stroke();

            ctx.restore();
        }

        function drawSkeleton(x, y, radius, angle, walkCycle) {
            ctx.save();
            let bobY = Math.sin(walkCycle * 0.3) * 2;

            ctx.beginPath();
            ctx.arc(x, y + bobY, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#e8e8d0';
            ctx.fill();
            ctx.strokeStyle = '#b8b8a0';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(x - 5, y + bobY - 3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 5, y + bobY - 3, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#111';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - 4, y + bobY + 6);
            ctx.lineTo(x + 4, y + bobY + 6);
            ctx.stroke();

            ctx.restore();
        }

        function drawSpider(x, y, radius, angle, walkCycle) {
            ctx.save();
            let bobY = Math.sin(walkCycle * 0.5) * 1;

            ctx.beginPath();
            ctx.arc(x, y + bobY, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 2;
            ctx.stroke();

            for (let i = 0; i < 4; i++) {
                let legAngle = (i / 4) * Math.PI + Math.PI / 2;
                let legLen = radius + 8 + Math.sin(walkCycle * 0.4 + i) * 3;
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(legAngle) * radius, y + bobY + Math.sin(legAngle) * radius);
                ctx.lineTo(x + Math.cos(legAngle) * legLen, y + bobY + Math.sin(legAngle) * (legLen + 5));
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x - Math.cos(legAngle) * radius, y + bobY + Math.sin(legAngle) * radius);
                ctx.lineTo(x - Math.cos(legAngle) * legLen, y + bobY + Math.sin(legAngle) * (legLen + 5));
                ctx.stroke();
            }

            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(x - 4, y + bobY - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 4, y + bobY - 3, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawTree(tree, camX, camY) {
            let sx = tree.x - camX;
            let sy = tree.y - camY;
            if (sx < -100 || sx > canvas.width + 100 || sy < -150 || sy > canvas.height + 100) return;

            let sway = Math.sin(game.dayTime * 3 + tree.sway) * 3;

            ctx.fillStyle = '#5c3a1e';
            ctx.fillRect(sx - 6, sy - 10, 12, 35);

            let leafColors = ['#2d7a3a', '#3a8a4a', '#228b22'];
            ctx.fillStyle = leafColors[tree.type];
            ctx.beginPath();
            ctx.arc(sx + sway, sy - 30, tree.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#1a5c2a';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (tree.health < tree.maxHealth) {
                ctx.fillStyle = '#333';
                ctx.fillRect(sx - 15, sy - 60, 30, 5);
                ctx.fillStyle = '#4a2';
                ctx.fillRect(sx - 15, sy - 60, 30 * (tree.health / tree.maxHealth), 5);
            }
        }

        function drawRock(rock, camX, camY) {
            let sx = rock.x - camX;
            let sy = rock.y - camY;
            if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;

            let colors = ['#888', '#777', '#999'];
            ctx.fillStyle = colors[rock.type];
            ctx.beginPath();
            ctx.moveTo(sx - rock.radius, sy);
            ctx.lineTo(sx - rock.radius * 0.5, sy - rock.radius);
            ctx.lineTo(sx + rock.radius * 0.5, sy - rock.radius * 0.8);
            ctx.lineTo(sx + rock.radius, sy);
            ctx.lineTo(sx + rock.radius * 0.7, sy + rock.radius * 0.5);
            ctx.lineTo(sx - rock.radius * 0.7, sy + rock.radius * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (rock.health < rock.maxHealth) {
                ctx.fillStyle = '#333';
                ctx.fillRect(sx - 15, sy - rock.radius - 10, 30, 5);
                ctx.fillStyle = '#a88';
                ctx.fillRect(sx - 15, sy - rock.radius - 10, 30 * (rock.health / rock.maxHealth), 5);
            }
        }

        function drawBush(bush, camX, camY) {
            let sx = bush.x - camX;
            let sy = bush.y - camY;
            if (sx < -30 || sx > canvas.width + 30 || sy < -30 || sy > canvas.height + 30) return;

            if (bush.picked) {
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.arc(sx, sy, 6, 0, Math.PI * 2);
                ctx.fill();
                return;
            }

            ctx.fillStyle = '#2a6e2a';
            ctx.beginPath();
            ctx.arc(sx, sy, bush.radius, 0, Math.PI * 2);
            ctx.fill();

            if (bush.type === 'berry') {
                ctx.fillStyle = '#cc3333';
                for (let i = 0; i < 4; i++) {
                    let a = (i / 4) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.arc(sx + Math.cos(a) * 6, sy + Math.sin(a) * 6, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                ctx.fillStyle = '#4a8a4a';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(sx + (i - 1) * 7, sy - 2, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawDrop(drop, camX, camY) {
            let sx = drop.x - camX;
            let sy = drop.y - camY + Math.sin(game.dayTime * 5 + drop.bobOffset) * 4;
            if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) return;

            let item = ITEMS[drop.itemId];
            ctx.font = '22px serif';
            ctx.textAlign = 'center';
            ctx.fillText(item.icon, sx, sy + 7);
        }

        function shadeColor(color, percent) {
            let num = parseInt(color.replace('#', ''), 16);
            let r = Math.min(255, Math.max(0, (num >> 16) + percent));
            let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
            let b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
            return '#' + (b | (g << 8) | (r << 16)).toString(16).padStart(6, '0');
        }

        function updatePlayer() {
            let dx = 0, dy = 0;
            if (keys['w'] || keys['ц']) dy = -1;
            if (keys['s'] || keys['ы']) dy = 1;
            if (keys['a'] || keys['ф']) dx = -1;
            if (keys['d'] || keys['в']) dx = 1;

            let len = Math.hypot(dx, dy);
            if (len > 0) {
                dx /= len;
                dy /= len;
                player.walkCycle++;
            }

            let spd = player.speed;
            if (player.isDashing) {
                spd = 12;
                dx = player.dashDx;
                dy = player.dashDy;
                player.dashTimer--;
                if (player.dashTimer <= 0) player.isDashing = false;
            }

            player.x += dx * spd;
            player.y += dy * spd;
            player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));

            game.trees.forEach(t => {
                let d = dist(player, t);
                if (d < player.radius + t.radius * 0.4) {
                    let ang = Math.atan2(player.y - t.y, player.x - t.x);
                    player.x = t.x + Math.cos(ang) * (player.radius + t.radius * 0.4);
                    player.y = t.y + Math.sin(ang) * (player.radius + t.radius * 0.4);
                }
            });

            game.rocks.forEach(r => {
                let d = dist(player, r);
                if (d < player.radius + r.radius) {
                    let ang = Math.atan2(player.y - r.y, player.x - r.x);
                    player.x = r.x + Math.cos(ang) * (player.radius + r.radius);
                    player.y = r.y + Math.sin(ang) * (player.radius + r.radius);
                }
            });

            let mx = mouseX - canvas.width / 2;
            let my = mouseY - canvas.height / 2;
            player.angle = Math.atan2(my, mx);

            if (player.dashCooldown > 0) player.dashCooldown--;
            if (player.hitCooldown > 0) player.hitCooldown--;

            player.hunger -= 0.003;
            if (player.hunger <= 0) {
                player.hunger = 0;
                player.health -= 0.05;
            }

            if (player.eyeBlink > 0) player.eyeBlink--;
            if (Math.random() < 0.005) player.eyeBlink = 8;

            if (player.health <= 0) {
                game.running = false;
                document.getElementById('deathScreen').classList.add('show');
                let mins = Math.floor(game.timePlayed / 60);
                let secs = Math.floor(game.timePlayed % 60);
                document.getElementById('deathStats').textContent =
                    `Уровень: ${player.level} | Убийств: ${game.kills} | Время: ${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        function updateEnemies() {
            game.entities.forEach((e, idx) => {
                let d = dist(e, player);

                if (d < e.aggroRange) {
                    e.state = 'chase';
                } else if (e.state === 'chase' && d > e.aggroRange * 1.5) {
                    e.state = 'wander';
                }

                if (e.state === 'chase') {
                    let ang = Math.atan2(player.y - e.y, player.x - e.x);
                    e.angle = ang;
                    e.x += Math.cos(ang) * e.speed;
                    e.y += Math.sin(ang) * e.speed;
                    e.walkCycle++;

                    if (d < e.radius + player.radius + 5 && e.attackCooldown <= 0) {
                        let dmg = e.damage;
                        if (player.armor > 0) {
                            let absorbed = Math.min(player.armor, dmg * 0.6);
                            player.armor -= absorbed;
                            dmg -= absorbed;
                        }
                        player.health -= dmg;
                        e.attackCooldown = 40;
                        spawnParticle(player.x, player.y, '#ff4444', 5, 3, 20);
                        player.hitCooldown = 10;
                    }
                } else {
                    e.wanderTimer--;
                    if (e.wanderTimer <= 0) {
                        e.wanderAngle = Math.random() * Math.PI * 2;
                        e.wanderTimer = 60 + Math.random() * 120;
                    }
                    e.x += Math.cos(e.wanderAngle) * e.speed * 0.3;
                    e.y += Math.sin(e.wanderAngle) * e.speed * 0.3;
                    e.angle = e.wanderAngle;
                    e.walkCycle++;
                }

                e.x = Math.max(e.radius, Math.min(WORLD_SIZE - e.radius, e.x));
                e.y = Math.max(e.radius, Math.min(WORLD_SIZE - e.radius, e.y));

                if (e.attackCooldown > 0) e.attackCooldown--;

                game.trees.forEach(t => {
                    let td = Math.hypot(e.x - t.x, e.y - t.y);
                    if (td < e.radius + t.radius * 0.4) {
                        let ang = Math.atan2(e.y - t.y, e.x - t.x);
                        e.x = t.x + Math.cos(ang) * (e.radius + t.radius * 0.4);
                        e.y = t.y + Math.sin(ang) * (e.radius + t.radius * 0.4);
                    }
                });

                game.rocks.forEach(r => {
                    let rd = Math.hypot(e.x - r.x, e.y - r.y);
                    if (rd < e.radius + r.radius) {
                        let ang = Math.atan2(e.y - r.y, e.x - r.x);
                        e.x = r.x + Math.cos(ang) * (e.radius + r.radius);
                        e.y = r.y + Math.sin(ang) * (e.radius + r.radius);
                    }
                });
            });
        }

        function playerAttack() {
            let now = Date.now();
            let item = getSelectedItem();
            let key = getSelectedItemKey();
            let cooldown = 300;

            if (item && item.fireRate) {
                cooldown = item.fireRate;
            }

            if (now - player.lastAttack < cooldown) return;
            player.lastAttack = now;

            if (item && item.type === 'consumable') {
                if (item.hunger) {
                    player.hunger = Math.min(player.maxHunger, player.hunger + item.hunger);
                }
                if (item.health) {
                    player.health = Math.min(player.maxHealth, player.health + item.health);
                }
                if (player.inv[player.selectedSlot].count > 1) {
                    player.inv[player.selectedSlot].count--;
                } else {
                    player.inv[player.selectedSlot] = { id: null, count: 0 };
                }
                spawnParticle(player.x, player.y, '#44ff44', 5, 2, 20);
                return;
            }

            if (item && item.type === 'ammo') {
                return;
            }

            if (item && (item.ammo === 'shell' || item.ammo === 'bullet')) {
                if (countItem(item.ammo) <= 0) return;
                removeItem(item.ammo, 1);

                if (item.ammo === 'shell') {
                    for (let i = 0; i < 8; i++) {
                        let spread = (Math.random() - 0.5) * 0.5;
                        let a = player.angle + spread;
                        game.particles.push({
                            x: player.x,
                            y: player.y,
                            vx: Math.cos(a) * 15,
                            vy: Math.sin(a) * 15,
                            life: 15,
                            maxLife: 15,
                            color: '#ffaa00',
                            size: 3,
                            isBullet: true,
                            damage: item.damage / 3,
                            range: item.range || 250,
                            distTraveled: 0,
                        });
                    }
                } else {
                    game.particles.push({
                        x: player.x,
                        y: player.y,
                        vx: Math.cos(player.angle) * 20,
                        vy: Math.sin(player.angle) * 20,
                        life: 20,
                        maxLife: 20,
                        color: '#ffff00',
                        size: 3,
                        isBullet: true,
                        damage: item.damage,
                        range: item.range || 400,
                        distTraveled: 0,
                    });
                }
                spawnParticle(player.x + Math.cos(player.angle) * 25, player.y + Math.sin(player.angle) * 25, '#ffaa00', 3, 2, 10);
                return;
            }

            let range = 50;
            let damage = 5;

            if (item && item.type === 'weapon') {
                damage = item.damage;
                range = 55;
            }

            if (item && item.type === 'tool') {
                damage = item.damage || 5;
                range = 45;
            }

            let hitX = player.x + Math.cos(player.angle) * range;
            let hitY = player.y + Math.sin(player.angle) * range;

            spawnParticle(hitX, hitY, '#ffffff', 3, 2, 8);

            game.entities.forEach(e => {
                if (dist({ x: hitX, y: hitY }, e) < 30) {
                    e.health -= damage;
                    e.state = 'chase';
                    spawnParticle(e.x, e.y, '#ff0000', 5, 3, 15);

                    if (e.health <= 0) {
                        game.kills++;
                        let xpGain = e.type === 'zombie' ? 15 : e.type === 'skeleton' ? 20 : 10;
                        player.xp += xpGain;

                        if (player.xp >= player.xpNeeded) {
                            player.xp -= player.xpNeeded;
                            player.level++;
                            player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
                            player.maxHealth += 10;
                            player.health = player.maxHealth;
                            spawnParticle(player.x, player.y, '#ffcc00', 20, 5, 30);
                        }

                        spawnDrop(e.x, e.y, 'food', 1 + Math.floor(Math.random() * 2));
                        if (Math.random() < 0.3) spawnDrop(e.x + 10, e.y, 'fiber', 1 + Math.floor(Math.random() * 3));
                        if (e.type === 'skeleton' && Math.random() < 0.4) spawnDrop(e.x - 10, e.y, 'iron', 1 + Math.floor(Math.random() * 2));

                        addKillFeed(`${e.type === 'zombie' ? 'Зомби' : e.type === 'skeleton' ? 'Скелет' : 'Паук'} убит!`);
                        game.entities.splice(game.entities.indexOf(e), 1);
                    }
                }
            });

            game.trees.forEach(t => {
                if (dist({ x: hitX, y: hitY }, t) < t.radius + 10) {
                    let dmg = damage;
                    if (item && item.type === 'tool' && item.mineSpeed) dmg *= item.mineSpeed;
                    t.health -= dmg;
                    spawnParticle(hitX, hitY, '#8B4513', 3, 2, 10);
                    if (t.health <= 0) {
                        spawnDrop(t.x, t.y, 'wood', 3 + Math.floor(Math.random() * 5));
                        if (Math.random() < 0.3) spawnDrop(t.x + 10, t.y, 'fiber', 1 + Math.floor(Math.random() * 2));
                        game.trees.splice(game.trees.indexOf(t), 1);
                    }
                }
            });

            game.rocks.forEach(r => {
                if (dist({ x: hitX, y: hitY }, r) < r.radius + 10) {
                    let dmg = damage;
                    if (item && item.type === 'tool' && item.mineSpeed) dmg *= item.mineSpeed;
                    r.health -= dmg;
                    spawnParticle(hitX, hitY, '#888', 3, 2, 10);
                    if (r.health <= 0) {
                        spawnDrop(r.x, r.y, 'stone', 3 + Math.floor(Math.random() * 4));
                        if (Math.random() < 0.4) spawnDrop(r.x - 10, r.y, 'iron', 1 + Math.floor(Math.random() * 3));
                        game.rocks.splice(game.rocks.indexOf(r), 1);
                    }
                }
            });

            game.bushes.forEach(b => {
                if (!b.picked && dist({ x: hitX, y: hitY }, b) < 25) {
                    if (b.type === 'berry') {
                        spawnDrop(b.x, b.y, 'berry', 2 + Math.floor(Math.random() * 3));
                    } else {
                        spawnDrop(b.x, b.y, 'fiber', 2 + Math.floor(Math.random() * 3));
                    }
                    b.picked = true;
                    b.respawnTimer = 600;
                }
            });
        }

        function pickupDrops() {
            game.drops.forEach((d, idx) => {
                if (dist(player, d) < 40) {
                    if (addToInventory(d.itemId, d.count)) {
                        spawnParticle(d.x, d.y, '#ffcc00', 3, 2, 10);
                        game.drops.splice(idx, 1);
                    }
                }
            });
        }

        function addKillFeed(msg) {
            let el = document.createElement('div');
            el.className = 'kill-msg';
            el.textContent = msg;
            document.getElementById('killFeed').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        let keys = {};
        let mouseX = 0, mouseY = 0;
        let mouseDown = false;

        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;

            if (e.key >= '1' && e.key <= '5') {
                player.selectedSlot = parseInt(e.key) - 1;
                updateInventoryUI();
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                document.getElementById('craftPanel').classList.toggle('show');
            }

            if (e.key === ' ' && player.dashCooldown <= 0 && !player.isDashing) {
                let dx = 0, dy = 0;
                if (keys['w'] || keys['ц']) dy = -1;
                if (keys['s'] || keys['ы']) dy = 1;
                if (keys['a'] || keys['ф']) dx = -1;
                if (keys['d'] || keys['в']) dx = 1;
                let len = Math.hypot(dx, dy);
                if (len > 0) {
                    player.isDashing = true;
                    player.dashTimer = 6;
                    player.dashDx = dx / len;
                    player.dashDy = dy / len;
                    player.dashCooldown = 45;
                    spawnParticle(player.x, player.y, '#aaa', 8, 3, 15);
                }
            }

            if (e.key === 'e' || e.key === 'у') {
                pickupDrops();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) {
                mouseDown = true;
                playerAttack();
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mouseDown = false;
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('deathScreen').classList.remove('show');
            startGame();
        });

        function updateInventoryUI() {
            let inv = document.getElementById('inventory');
            inv.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                let slot = player.inv[i];
                let div = document.createElement('div');
                div.className = 'inv-slot' + (i === player.selectedSlot ? ' active' : '');

                let keySpan = document.createElement('span');
                keySpan.className = 'slot-key';
                keySpan.textContent = i + 1;
                div.appendChild(keySpan);

                if (slot.id) {
                    let icon = document.createElement('span');
                    icon.className = 'item-icon';
                    icon.textContent = ITEMS[slot.id].icon;
                    div.appendChild(icon);

                    if (slot.count > 1) {
                        let count = document.createElement('span');
                        count.className = 'item-count';
                        count.textContent = slot.count;
                        div.appendChild(count);
                    }

                    div.addEventListener('mouseenter', (e) => {
                        let tt = document.getElementById('tooltip');
                        tt.style.display = 'block';
                        tt.style.left = e.clientX + 10 + 'px';
                        tt.style.top = e.clientY - 60 + 'px';
                        tt.querySelector('.tt-name').textContent = ITEMS[slot.id].name;
                        tt.querySelector('.tt-desc').textContent = ITEMS[slot.id].type === 'weapon' ? 'Оружие' :
                            ITEMS[slot.id].type === 'tool' ? 'Инструмент' :
                            ITEMS[slot.id].type === 'consumable' ? 'Расходник' : '';
                        let stats = '';
                        if (ITEMS[slot.id].damage) stats += `Урон: ${ITEMS[slot.id].damage} `;
                        if (ITEMS[slot.id].defense) stats += `Защита: ${ITEMS[slot.id].defense} `;
                        if (ITEMS[slot.id].hunger) stats += `Сытость: +${ITEMS[slot.id].hunger} `;
                        if (ITEMS[slot.id].health) stats += `Здоровье: +${ITEMS[slot.id].health} `;
                        tt.querySelector('.tt-stats').textContent = stats;
                    });

                    div.addEventListener('mouseleave', () => {
                        document.getElementById('tooltip').style.display = 'none';
                    });
                }

                let idx = i;
                div.addEventListener('click', () => {
                    player.selectedSlot = idx;
                    updateInventoryUI();
                });

                inv.appendChild(div);
            }
        }

        function updateCraftUI() {
            let list = document.getElementById('craftList');
            list.innerHTML = '';
            RECIPES.forEach(recipe => {
                let item = ITEMS[recipe.result];
                let canCraft = true;
                for (let [res, need] of Object.entries(recipe.needs)) {
                    if (countItem(res) < need) canCraft = false;
                }

                let div = document.createElement('div');
                div.className = 'craft-item' + (canCraft ? '' : ' cant-craft');
                div.innerHTML = `
                    <span class="craft-icon">${item.icon}</span>
                    <div class="craft-info">
                        <div class="craft-name">${item.name}${recipe.count > 1 ? ' x' + recipe.count : ''}</div>
                        <div class="craft-recipe">${Object.entries(recipe.needs).map(([r, n]) => `${ITEMS[r].icon}${n}(${countItem(r)})`).join(' ')}</div>
                    </div>
                `;
                div.addEventListener('click', () => {
                    if (craftItem(recipe)) {
                        spawnParticle(player.x, player.y, '#44ff44', 8, 3, 20);
                        updateCraftUI();
                        updateInventoryUI();
                    }
                });
                list.appendChild(div);
            });
        }

        function updateBullets() {
            game.particles = game.particles.filter(p => {
                if (p.isBullet) {
                    p.distTraveled += Math.hypot(p.vx, p.vy);

                    if (p.distTraveled > p.range) return false;

                    game.entities.forEach(e => {
                        if (dist(p, e) < e.radius + 5) {
                            e.health -= p.damage;
                            e.state = 'chase';
                            spawnParticle(e.x, e.y, '#ff0000', 4, 3, 12);
                            p.life = 0;

                            if (e.health <= 0) {
                                game.kills++;
                                let xpGain = e.type === 'zombie' ? 15 : e.type === 'skeleton' ? 20 : 10;
                                player.xp += xpGain;
                                if (player.xp >= player.xpNeeded) {
                                    player.xp -= player.xpNeeded;
                                    player.level++;
                                    player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
                                    player.maxHealth += 10;
                                    player.health = player.maxHealth;
                                    spawnParticle(player.x, player.y, '#ffcc00', 20, 5, 30);
                                }
                                spawnDrop(e.x, e.y, 'food', 1 + Math.floor(Math.random() * 2));
                                if (Math.random() < 0.3) spawnDrop(e.x + 10, e.y, 'fiber', 1 + Math.floor(Math.random() * 2));
                                addKillFeed(`${e.type === 'zombie' ? 'Зомби' : e.type === 'skeleton' ? 'Скелет' : 'Паук'} убит!`);
                                game.entities.splice(game.entities.indexOf(e), 1);
                            }
                        }
                    });

                    game.trees.forEach(t => {
                        if (dist(p, t) < t.radius) {
                            t.health -= p.damage;
                            spawnParticle(p.x, p.y, '#8B4513', 2, 2, 8);
                            p.life = 0;
                            if (t.health <= 0) {
                                spawnDrop(t.x, t.y, 'wood', 3 + Math.floor(Math.random() * 5));
                                game.trees.splice(game.trees.indexOf(t), 1);
                            }
                        }
                    });
                }

                p.life--;
                return p.life > 0;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let camX = player.x - canvas.width / 2;
            let camY = player.y - canvas.height / 2;

            let skyR, skyG, skyB;
            let timeNorm = (Math.sin(game.dayTime) + 1) / 2;
            skyR = Math.floor(40 + timeNorm * 80);
            skyG = Math.floor(60 + timeNorm * 100);
            skyB = Math.floor(80 + timeNorm * 100);
            ctx.fillStyle = `rgb(${skyR}, ${skyG}, ${skyB})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#3a6632';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let startX = Math.max(0, Math.floor(camX / TILE));
            let startY = Math.max(0, Math.floor(camY / TILE));
            let endX = Math.min(WORLD_SIZE / TILE, Math.ceil((camX + canvas.width) / TILE) + 1);
            let endY = Math.min(WORLD_SIZE / TILE, Math.ceil((camY + canvas.height) / TILE) + 1);

            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            for (let x = startX; x < endX; x++) {
                for (let y = startY; y < endY; y++) {
                    let sx = x * TILE - camX;
                    let sy = y * TILE - camY;
                    let grassVar = ((x * 7 + y * 13) % 5);
                    let g = 90 + grassVar * 4;
                    ctx.fillStyle = `rgb(${50 + grassVar * 3}, ${g}, ${45 + grassVar * 2})`;
                    ctx.fillRect(sx, sy, TILE, TILE);
                }
            }

            ctx.strokeStyle = '#2a4a1a';
            ctx.lineWidth = 3;
            ctx.strokeRect(-camX, -camY, WORLD_SIZE, WORLD_SIZE);

            game.bushes.forEach(b => drawBush(b, camX, camY));
            game.trees.forEach(t => drawTree(t, camX, camY));
            game.rocks.forEach(r => drawRock(r, camX, camY));

            game.drops.forEach(d => drawDrop(d, camX, camY));

            game.entities.forEach(e => {
                let sx = e.x - camX;
                let sy = e.y - camY;
                if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;

                if (e.type === 'zombie') drawZombie(sx, sy, e.radius, e.angle, e.walkCycle);
                else if (e.type === 'skeleton') drawSkeleton(sx, sy, e.radius, e.angle, e.walkCycle);
                else drawSpider(sx, sy, e.radius, e.angle, e.walkCycle);

                ctx.fillStyle = '#333';
                ctx.fillRect(sx - 15, sy - e.radius - 12, 30, 5);
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(sx - 15, sy - e.radius - 12, 30 * (e.health / e.maxHealth), 5);
            });

            let isWalking = keys['w'] || keys['s'] || keys['a'] || keys['d'] || keys['ц'] || keys['ы'] || keys['ф'] || keys['в'];
            drawRoundCharacter(
                canvas.width / 2, canvas.height / 2,
                player.radius, player.angle,
                '#4488ff', '#ffffff',
                player.health, player.maxHealth,
                isWalking
            );

            let item = getSelectedItem();
            if (item && (item.type === 'weapon' || item.type === 'tool')) {
                let handX = canvas.width / 2 + Math.cos(player.angle) * 28;
                let handY = canvas.height / 2 + Math.sin(player.angle) * 28;
                ctx.save();
                ctx.translate(handX, handY);
                ctx.rotate(player.angle);
                ctx.font = '20px serif';
                ctx.fillText(item.icon, -10, 7);
                ctx.restore();
            }

            game.particles.forEach(p => {
                let sx = p.x - camX;
                let sy = p.y - camY;
                let alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.isBullet ? p.color : '#ffcc00';
                ctx.beginPath();
                ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            let nightAlpha = Math.max(0, 0.4 - timeNorm * 0.4);
            if (nightAlpha > 0) {
                ctx.fillStyle = `rgba(0, 0, 30, ${nightAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(canvas.width / 2 - 1, canvas.height / 2 - 15, 2, 12);

            mmCtx.clearRect(0, 0, 150, 150);
            mmCtx.fillStyle = '#2a4a1a';
            mmCtx.fillRect(0, 0, 150, 150);

            let mmScale = 150 / WORLD_SIZE;
            game.trees.forEach(t => {
                mmCtx.fillStyle = '#1a6a2a';
                mmCtx.fillRect(t.x * mmScale - 1, t.y * mmScale - 1, 2, 2);
            });
            game.rocks.forEach(r => {
                mmCtx.fillStyle = '#888';
                mmCtx.fillRect(r.x * mmScale - 1, r.y * mmScale - 1, 2, 2);
            });
            game.entities.forEach(e => {
                mmCtx.fillStyle = '#ff4444';
                mmCtx.fillRect(e.x * mmScale - 1, e.y * mmScale - 1, 2, 2);
            });
            mmCtx.fillStyle = '#44aaff';
            mmCtx.fillRect(player.x * mmScale - 3, player.y * mmScale - 3, 6, 6);

            let viewX = camX * mmScale;
            let viewY = camY * mmScale;
            let viewW = canvas.width * mmScale;
            let viewH = canvas.height * mmScale;
            mmCtx.strokeStyle = 'rgba(255,255,255,0.5)';
            mmCtx.lineWidth = 1;
            mmCtx.strokeRect(viewX, viewY, viewW, viewH);
        }

        function updateUI() {
            document.getElementById('healthBar').style.width = (player.health / player.maxHealth * 100) + '%';
            document.getElementById('hungerBar').style.width = (player.hunger / player.maxHunger * 100) + '%';
            document.getElementById('xpBar').style.width = (player.xp / player.xpNeeded * 100) + '%';

            let timeNorm = (Math.sin(game.dayTime) + 1) / 2;
            let timeStr = timeNorm > 0.5 ? 'День' : 'Ночь';
            document.getElementById('dayNight').textContent =
                `${timeStr} | Ур.${player.level} | 💀 ${game.kills}`;

            let item = getSelectedItem();
            let ammoEl = document.getElementById('ammoDisplay');
            if (item && item.ammo) {
                ammoEl.textContent = `${item.icon} ${item.name} | Патроны: ${countItem(item.ammo)}`;
                ammoEl.style.display = 'block';
            } else {
                ammoEl.style.display = 'none';
            }
        }

        function gameLoop() {
            if (!game.running) return;

            game.dayTime += game.daySpeed;
            game.timePlayed += 1 / 60;

            updatePlayer();
            updateEnemies();
            updateBullets();

            if (mouseDown) {
                let item = getSelectedItem();
                if (item && item.fireRate) {
                    playerAttack();
                }
            }

            game.bushes.forEach(b => {
                if (b.picked) {
                    b.respawnTimer--;
                    if (b.respawnTimer <= 0) b.picked = false;
                }
            });

            if (Math.random() < 0.003 && game.entities.length < 60) {
                spawnOneEnemy();
            }

            game.particles = game.particles.filter(p => {
                if (!p.isBullet) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.9;
                    p.vy *= 0.9;
                    p.life--;
                    return p.life > 0;
                }
                p.x += p.vx;
                p.y += p.vy;
                return p.life > 0;
            });

            game.drops.forEach(d => d.lifetime--);
            game.drops = game.drops.filter(d => d.lifetime > 0);

            draw();
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            game = {
                camera: { x: 0, y: 0 },
                entities: [],
                particles: [],
                drops: [],
                trees: [],
                rocks: [],
                bushes: [],
                dayTime: 0.5,
                daySpeed: 0.00008,
                kills: 0,
                timePlayed: 0,
                running: true,
            };
            player = createPlayer();
            spawnTree();
            spawnRocks();
            spawnBushes();
            spawnEnemies();
            updateInventoryUI();
            updateCraftUI();
            setInterval(updateCraftUI, 1000);
            gameLoop();
        }

        startGame();
    </script>
</body>
</html>
